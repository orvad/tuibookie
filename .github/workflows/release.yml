name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3237958
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Generate app token for Homebrew tap
        id: homebrew-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3237958
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tuibookie

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update website version
        run: sed -i "s/<!--VERSION-->.*<!--\/VERSION-->/<!--VERSION-->${GITHUB_REF_NAME}<!--\/VERSION-->/" website/index.html

      - name: Commit website version update
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "tuibookie-release-bot[bot]"
          git config user.email "tuibookie-release-bot[bot]@users.noreply.github.com"
          git add website/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update website version to ${TAG_NAME}"
            git push origin HEAD:main
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o tuibookie-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tuibookie-darwin-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tuibookie-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o tuibookie-linux-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tuibookie-darwin-arm64
            tuibookie-darwin-amd64
            tuibookie-linux-amd64
            tuibookie-linux-arm64

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          echo "darwin_arm64=$(sha256sum tuibookie-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum tuibookie-darwin-amd64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum tuibookie-linux-amd64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum tuibookie-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.checksums.outputs.darwin_amd64 }}
          SHA_LINUX_AMD64: ${{ steps.checksums.outputs.linux_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
          HOMEBREW_TAP_TOKEN: ${{ steps.homebrew-token.outputs.token }}
        run: |
          CLEAN_VERSION="${VERSION#v}"

          cat > /tmp/tuibookie.rb << FORMULA
          class Tuibookie < Formula
            desc "A fast, interactive terminal bookmark manager for CLI commands"
            homepage "https://github.com/orvad/tuibookie"
            version "${CLEAN_VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/orvad/tuibookie/releases/download/${VERSION}/tuibookie-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"

                def install
                  bin.install "tuibookie-darwin-arm64" => "tuibookie"
                end
              else
                url "https://github.com/orvad/tuibookie/releases/download/${VERSION}/tuibookie-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"

                def install
                  bin.install "tuibookie-darwin-amd64" => "tuibookie"
                end
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/orvad/tuibookie/releases/download/${VERSION}/tuibookie-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"

                def install
                  bin.install "tuibookie-linux-arm64" => "tuibookie"
                end
              else
                url "https://github.com/orvad/tuibookie/releases/download/${VERSION}/tuibookie-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"

                def install
                  bin.install "tuibookie-linux-amd64" => "tuibookie"
                end
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tuibookie --help 2>&1", 2)
            end
          end
          FORMULA

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/orvad/homebrew-tuibookie.git" /tmp/homebrew-tap
          cp /tmp/tuibookie.rb /tmp/homebrew-tap/Formula/tuibookie.rb
          cd /tmp/homebrew-tap
          git config user.name "tuibookie-release-bot[bot]"
          git config user.email "tuibookie-release-bot[bot]@users.noreply.github.com"
          git add Formula/tuibookie.rb
          git commit -m "Update tuibookie to ${VERSION}"
          git push
