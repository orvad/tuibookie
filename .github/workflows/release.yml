name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o tuibookie-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tuibookie-darwin-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o tuibookie-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o tuibookie-linux-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tuibookie-darwin-arm64
            tuibookie-darwin-amd64
            tuibookie-linux-amd64
            tuibookie-linux-arm64
